<div class="panel-content">

    <p-inputotp style="margin: 15px 0px;" [(ngModel)]="passKeyValue" [integerOnly]="true" [mask]="true"  size="large" [length]="6">
    <ng-template pTemplate="input" let-events="events"  let-i="i">
        <input type="password" maxlength="1"  (input)="events.input($event)" (keydown)="events.keydown($event)"  class="otp-box" />
    </ng-template>
</p-inputotp>
<div class="panel-title" style="margin-top:14px">Enter 6-digit Passkey</div>
 <div class="panel-sub">We'll guide you through the verification</div>
      </div>

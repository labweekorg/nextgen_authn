<div class="panel-content">
  <div
    *ngIf="!success && !error"
    style="margin-bottom: 8px; color: var(--primary); font-size: 14px"
  >
    {{ statusMessage }}
  </div>

  <div *ngIf="success" style="margin-bottom: 16px">
    <span style="font-size: 48px; color: #10b981">✓</span>
    <div style="margin-top: 8px; color: #10b981; font-weight: 500">Verified!</div>
  </div>

  <div *ngIf="error" style="margin-bottom: 16px">
    <span style="font-size: 48px; color: #ef4444">✕</span>
    <div style="margin-top: 8px; color: #ef4444; font-weight: 500">Failed</div>
  </div>

  <p-inputotp
    *ngIf="!success"
    style="margin: 15px 0px"
    [(ngModel)]="passKeyValue"
    [integerOnly]="true"
    [mask]="true"
    [disabled]="verifying"
    size="large"
    [length]="6"
  >
    <ng-template pTemplate="input" let-events="events" let-i="i">
      <input
        type="password"
        maxlength="1"
        (input)="events.input($event)"
        (keydown)="events.keydown($event)"
        class="otp-box"
        [disabled]="verifying"
      />
    </ng-template>
  </p-inputotp>

  <div
    class="panel-title"
    style="margin-top: 14px"
    [style.color]="success ? '#10b981' : error ? '#ef4444' : ''"
  >
    <span *ngIf="!success && !error">Enter 6-digit Passkey</span>
    <span *ngIf="success">Passkey Verified</span>
    <span *ngIf="error">Invalid Passkey</span>
  </div>

  <div class="panel-sub">
    <span *ngIf="verifying">Verifying your passkey...</span>
    <span *ngIf="!verifying && !success && !error">{{ statusMessage }}</span>
    <span *ngIf="success">Redirecting to Workday...</span>
    <span *ngIf="error">{{ statusMessage }}</span>
  </div>
</div>

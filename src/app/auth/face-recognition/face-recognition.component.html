<div class="panel-content">
  <div class="face-box" [class.scanning]="scanning" [class.success]="success" [class.error]="error">
    <video
      #videoElement
      *ngIf="cameraReady && !success && !error"
      autoplay
      playsinline
      muted
      class="video-feed"
    ></video>

    <div *ngIf="!cameraReady && !success && !error" class="camera-placeholder">
      <span style="font-size: 48px; opacity: 0.3">📷</span>
    </div>

    <span *ngIf="success" style="font-size: 48px; color: #10b981">✓</span>
    <span *ngIf="error" style="font-size: 48px; color: #ef4444">✕</span>

    <div *ngIf="scanning" class="face-scan-line"></div>
    <div *ngIf="cameraReady && !success && !error" class="face-outline"></div>
  </div>

  <div class="panel-title" [style.color]="success ? '#10b981' : error ? '#ef4444' : ''">
    <span *ngIf="!success && !error">Look at the camera</span>
    <span *ngIf="success">Verified!</span>
    <span *ngIf="error">Failed</span>
  </div>

  <div class="panel-sub">{{ statusMessage }}</div>

  <div *ngIf="scanning" style="margin-top: 16px; color: var(--primary); font-size: 14px">
    Analyzing face...
  </div>

  <button
    *ngIf="error && !scanning && !success"
    (click)="retry()"
    style="
      margin-top: 16px;
      padding: 10px 28px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    "
  >
    Try Again
  </button>
</div>
